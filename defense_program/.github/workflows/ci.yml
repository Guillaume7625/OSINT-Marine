name: Defense Program CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
      - name: Install dependencies
        run: npm install
        working-directory: defense_program
      - name: Run tests
        run: npm test
        working-directory: defense_program
      - name: Run PostgreSQL migration
        run: |
          if [ -n "$DATABASE_URL" ]; then
            cd defense_program && DATABASE_URL=$DATABASE_URL STORE_BACKEND=postgres npm run db:migrate;
          fi
